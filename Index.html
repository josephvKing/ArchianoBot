<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal AI Chat Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Sidebar -->
  <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-800 text-white p-4 shadow-lg overflow-auto hidden md:block">
    <h2 class="text-xl font-bold mb-4">Chat History</h2>
    <div id="chat-history" class="space-y-2 overflow-y-auto h-3/4"></div>
    <button id="clear-history" class="mt-4 text-red-400 hover:text-red-500">Clear History</button>
  </div>

  <!-- Main Content -->
  <div class="flex justify-between min-h-screen">
    <div class="flex-1 p-6">
      <!-- Chat Window -->
      <div id="chat-container" class="bg-white p-4 rounded-lg shadow-md h-full overflow-y-auto">
        <div id="messages" class="space-y-4 h-full overflow-y-auto">
          <!-- Messages will be appended here -->
        </div>
      </div>
      <div class="flex mt-4">
        <textarea id="user-input" rows="3" class="w-full p-3 border rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type a message..."></textarea>
        <button id="send-button" class="bg-blue-500 text-white px-4 py-3 ml-2 rounded-md hover:bg-blue-600">Send</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center z-50">
    <div class="bg-white p-6 rounded-lg w-96">
      <h2 class="text-xl font-bold mb-4">Settings</h2>
      <div class="mb-4">
        <label for="api-key" class="block text-gray-700">OpenRouter API Key</label>
        <input id="api-key" type="text" class="w-full p-3 border rounded-md shadow-sm" placeholder="Enter API Key" />
      </div>
      <div class="mb-4">
        <label for="model-name" class="block text-gray-700">Custom Model Name</label>
        <input id="model-name" type="text" class="w-full p-3 border rounded-md shadow-sm" placeholder="Enter Model Name" />
      </div>
      <div class="flex justify-end space-x-2">
        <button id="close-settings" class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600">Close</button>
        <button id="save-settings" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600">Save</button>
      </div>
    </div>
  </div>

  <!-- Floating Settings Button -->
  <button id="settings-btn" class="fixed bottom-4 right-4 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600">
    ⚙️
  </button>

  <script>
    // Initialize variables
    const apiKey = localStorage.getItem('apiKey') || '';
    const modelName = localStorage.getItem('modelName') || '';
    const chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const chatContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    const settingsModal = document.getElementById('settings-modal');
    const settingsBtn = document.getElementById('settings-btn');
    const closeSettings = document.getElementById('close-settings');
    const saveSettings = document.getElementById('save-settings');
    const apiKeyInput = document.getElementById('api-key');
    const modelNameInput = document.getElementById('model-name');
    const chatHistoryContainer = document.getElementById('chat-history');
    const clearHistoryBtn = document.getElementById('clear-history');

    // Handle sending messages
    const sendMessage = async () => {
      const message = userInput.value.trim();
      if (!message) return;

      // Append user message to chat
      appendMessage('user', message);
      userInput.value = '';

      // Save chat to history
      chatHistory.push({ sender: 'user', text: message });
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

      // Fetch AI response
      await getAIResponse(message);
    };

    // Fetch AI response using OpenRouter API
    const getAIResponse = async (userMessage) => {
      const url = `https://api.openrouter.com/v1/models/${modelName || 'default-model'}/chat`;
      const headers = { 'Authorization': `Bearer ${apiKey}` };
      const body = {
        model: modelName || 'default-model',
        messages: [{ role: 'user', content: userMessage }],
      };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { ...headers, 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error('AI response failed');
        }

        const data = await response.json();
        const aiMessage = data.choices[0].message.content;

        // Append AI message to chat
        appendMessage('ai', aiMessage);

        // Save chat to history
        chatHistory.push({ sender: 'ai', text: aiMessage });
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

      } catch (error) {
        appendMessage('ai', 'Error: Could not fetch AI response.');
      }
    };

    // Append message to the chat container
    const appendMessage = (sender, text) => {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('flex', 'items-start', 'mb-4');
      if (sender === 'user') {
        messageDiv.innerHTML = `<div class="bg-blue-100 p-3 rounded-lg max-w-xs ml-auto">${text}</div>`;
      } else {
        messageDiv.innerHTML = `<div class="bg-gray-200 p-3 rounded-lg max-w-xs">${text}</div>`;
      }
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    // Load chat history from localStorage
    const loadChatHistory = () => {
      chatHistory.forEach(item => appendMessage(item.sender, item.text));
    };

    // Open settings modal
    settingsBtn.addEventListener('click', () => {
      apiKeyInput.value = apiKey;
      modelNameInput.value = modelName;
      settingsModal.classList.remove('hidden');
    });

    // Close settings modal
    closeSettings.addEventListener('click', () => {
      settingsModal.classList.add('hidden');
    });

    // Save settings and close modal
    saveSettings.addEventListener('click', () => {
      localStorage.setItem('apiKey', apiKeyInput.value);
      localStorage.setItem('modelName', modelNameInput.value);
      settingsModal.classList.add('hidden');
    });

    // Clear chat history
    clearHistoryBtn.addEventListener('click', () => {
      localStorage.removeItem('chatHistory');
      chatHistory.length = 0;
      chatHistoryContainer.innerHTML = '';
      chatContainer.innerHTML = '';
    });

    // Send button event listener
    sendButton.addEventListener('click', sendMessage);

    // Enter key event listener
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Load chat history on page load
    window.onload = () => {
      loadChatHistory();
    };

  </script>

</body>
</html>
